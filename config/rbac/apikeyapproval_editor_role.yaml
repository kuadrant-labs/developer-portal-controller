# This rule is not used by the project developer-portal-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the devportal.kuadrant.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: developer-portal-controller
    app.kubernetes.io/managed-by: kustomize
  name: apikeyapproval-editor-role
rules:
- apiGroups:
  - devportal.kuadrant.io
  resources:
  - apikeyapprovals
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - devportal.kuadrant.io
  resources:
  - apikeyapprovals/status
  verbs:
  - get
