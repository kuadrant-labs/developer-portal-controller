# This rule is not used by the project developer-portal-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to devportal.kuadrant.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: developer-portal-controller
    app.kubernetes.io/managed-by: kustomize
  name: apikeyapproval-viewer-role
rules:
- apiGroups:
  - devportal.kuadrant.io
  resources:
  - apikeyapprovals
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - devportal.kuadrant.io
  resources:
  - apikeyapprovals/status
  verbs:
  - get
