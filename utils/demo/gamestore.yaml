---
apiVersion: v1
kind: Namespace
metadata:
  name: gamestore
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gamestore
  namespace: gamestore
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: v1
kind: Service
metadata:
  name: gamestore
  namespace: gamestore
  labels:
    backstage.io/kubernetes-id: gamestore
spec:
  selector:
    app: gamestore
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gamestore
  namespace: gamestore
  labels:
    app: gamestore
    backstage.io/kubernetes-id: gamestore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gamestore
  template:
    metadata:
      labels:
        app: gamestore
    spec:
      containers:
        - name: gamestore
          image: quay.io/kuadrant/authorino-examples:talker-api
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gamestore
  namespace: gamestore
spec:
  parentRefs:
    - name: gamestore
      namespace: gamestore
  hostnames:
    - api.gamestore.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
          method: GET
      backendRefs:
        - name: gamestore
          port: 80
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: gamestore-auth
  namespace: gamestore
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: gamestore
  rules:
    authentication:
      "demo-admin-realm":
        jwt:
          issuerUrl: https://oidc.example.com/realms/demo-admin
      "vip-users":
        apiKey:
          selector:
            matchLabels:
              app: gamestore
              role: admin
          allNamespaces: true
        credentials:
          authorizationHeader:
            prefix: APIKEY
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  name: gamestore-plan
  namespace: gamestore
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: gamestore
  plans:
    - tier: gold
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "gold"
      limits:
        daily: 100
    - tier: silver
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "silver"
      limits:
        daily: 50
    - tier: bronze
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "bronze"
      limits:
        daily: 10
---
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: gamestore-api
  namespace: gamestore
spec:
  displayName: Gamestore API
  description: Simple game store api for demonstration
  version: v1
  approvalMode: manual
  publishStatus: Published
  tags:
    - demo
    - retail
    - games
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: gamestore
  documentation:
    openAPISpecURL: https://raw.githubusercontent.com/Kuadrant/kuadrantctl/main/examples/oas3/petstore.yaml
    docsURL: https://github.com/Kuadrant/kuadrantctl/blob/main/examples/oas3/petstore.yaml
  contact:
    team: api-owners
    email: api-owners@example.com
    slack: "#api-support"
